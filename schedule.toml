# rs-golden-queens 스케줄 정의
#
# 이 파일은 scheduler.py가 시작될 때 /app/schedule.toml 에서 읽힙니다.
# 시간대는 항상 Asia/Seoul (KST).
#
# 필드:
#   id          (필수) 작업 식별자 (로그 / APScheduler job ID)
#   command     (필수) main.py 의 subcommand (daily-kr | daily-us | weekly | notify-test)
#   day_of_week (필수) cron 요일 표현 (예: "mon-fri", "tue-sat", "fri")
#   hour        (필수) 0~23
#   minute      (필수) 0~59
#   description (선택) 사람용 설명
#   env         (선택) 이 작업에만 적용할 추가 환경변수 (예: { MARKET_SCHEDULE = "edt" })
#
# 변경 절차:
#   1) 이 파일 수정 + 커밋 + push
#   2) v* 태그 푸시 → GitHub Actions 자동 빌드 → Docker Hub
#   3) NAS 컨테이너 자동 업데이트 (DSM 7.2+) 또는 수동 재설정

[[job]]
id = "daily-kr"
command = "daily-kr"
day_of_week = "mon-fri"
hour = 18
minute = 10
description = "한국장 매매동향"

[[job]]
id = "weekly"
command = "weekly"
day_of_week = "mon-fri"
hour = 18
minute = 30
description = "주간 리포트 (이번 주 마지막 거래일만 발송)"

[[job]]
id = "daily-us"
command = "daily-us"
day_of_week = "tue-sat"
hour = 7
minute = 0
description = "미국장 마감 요약 (DST 시즌 무관)"

