name: Daily collect

# 매일 KST 18:10 (UTC 09:10) 자동 실행 + 수동 트리거 지원.
# 한국 주식시장은 KST 15:30 본장 마감 + 18:00 시간외 종료. 18:10이면
# 시간외 거래까지 모두 반영된 안정 시점이다.
on:
  schedule:
    - cron: "10 9 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run collector
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m naver_investor_flow.collect
