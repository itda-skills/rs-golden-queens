name: 한국장 매매동향 푸시

on:
  # NAS 작업 스케줄러가 GitHub API/CLI로 정시에 dispatch.
  # 필요하면 Actions 탭에서 수동 실행 가능.
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send Korea market flow
        env:
          GOLDENQUEENS_BOT_TOKEN: ${{ secrets.GOLDENQUEENS_BOT_TOKEN }}
          GOLDENQUEENS_CHAT_ID:   ${{ secrets.GOLDENQUEENS_CHAT_ID }}
          KIS_APP_KEY:            ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:         ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT:            ${{ secrets.KIS_ACCOUNT }}
          MARKET_FLOW_RENDER: text
          TZ: Asia/Seoul
        run: python main.py daily-kr
