name: 한국장 매매동향 푸시

on:
  # NAS 작업 스케줄러가 GitHub API/CLI로 정시에 dispatch.
  # 필요하면 Actions 탭에서 수동 실행 가능.
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      # 데이터 저장소(rs-golden-queens-data) 발행용 deploy key.
      # 시크릿이 없으면 발행은 비활성(MARKET_FLOW_PUBLISH 미설정)이라 발송만 수행.
      - name: Setup data-repo deploy key
        if: ${{ env.DATA_REPO_DEPLOY_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}

      - name: Send Korea market flow
        env:
          GOLDENQUEENS_BOT_TOKEN: ${{ secrets.GOLDENQUEENS_BOT_TOKEN }}
          GOLDENQUEENS_CHAT_ID:   ${{ secrets.GOLDENQUEENS_CHAT_ID }}
          KIS_APP_KEY:            ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:         ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT:            ${{ secrets.KIS_ACCOUNT }}
          MARKET_FLOW_RENDER: text
          MARKET_FLOW_PUBLISH: ${{ env.DATA_REPO_DEPLOY_KEY != '' && '1' || '' }}
          TZ: Asia/Seoul
        run: python main.py daily-kr
