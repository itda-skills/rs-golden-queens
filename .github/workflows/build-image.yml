name: 컨테이너 이미지 빌드 및 푸시

# v* 태그가 푸시되면 Docker Hub에 멀티 아키텍처(amd64+arm64) 이미지 푸시.
# 수동 트리거(workflow_dispatch)도 가능 — 이 경우 latest 태그는 안 붙고 sha 태그만.
#
# 필요한 시크릿 (Repository Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  Docker Hub 사용자명
#   DOCKERHUB_TOKEN     Docker Hub Access Token (Read & Write 권한)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_REPO: rs-golden-queens

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 시크릿 사전 검증
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DH_USER" ] || [ -z "$DH_TOKEN" ]; then
            echo "::error::DOCKERHUB_USERNAME 또는 DOCKERHUB_TOKEN 시크릿이 설정되지 않았습니다."
            echo "::error::Repository Settings → Secrets and variables → Actions 에서 등록하세요."
            exit 1
          fi
          echo "Docker Hub 시크릿 OK: user=$DH_USER (token 마스킹)"

      - name: 체크아웃
        uses: actions/checkout@v4

      - name: QEMU 설정 (arm64 크로스 빌드용)
        uses: docker/setup-qemu-action@v3

      - name: Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 메타데이터 / 태그 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }},format=short
          labels: |
            org.opencontainers.image.title=rs-golden-queens
            org.opencontainers.image.description=Korean/US market flow scheduler

      - name: 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 결과 요약
        run: |
          {
            echo "## 푸시된 이미지"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "- Docker Hub: https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}"
          } >> "$GITHUB_STEP_SUMMARY"
