name: 한국장 매매동향 테스트 푸시

on:
  workflow_dispatch:
    inputs:
      date:
        description: "발송할 거래일 (YYYYMMDD, 비우면 오늘). 휴장일이면 휴장 안내만 발송됨"
        required: false
        default: ""

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      # 테스트 발행은 데이터 저장소의 test 브랜치로 (운영 main 데이터 보호)
      - name: Setup data-repo deploy key
        if: ${{ env.DATA_REPO_DEPLOY_KEY != '' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}

      - name: Send Korea market flow to test chat
        env:
          TEST_GOLDENQUEENS_BOT_TOKEN: ${{ secrets.TEST_GOLDENQUEENS_BOT_TOKEN }}
          TEST_GOLDENQUEENS_CHAT_ID:   ${{ secrets.TEST_GOLDENQUEENS_CHAT_ID }}
          KIS_APP_KEY:                 ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:              ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT:                 ${{ secrets.KIS_ACCOUNT }}
          MARKET_FLOW_RENDER: text
          MARKET_FLOW_PUBLISH: ${{ env.DATA_REPO_DEPLOY_KEY != '' && '1' || '' }}
          GOLDENQUEENS_DATA_BRANCH: test
          TZ: Asia/Seoul
        run: python main.py daily-kr --test ${{ inputs.date }}
