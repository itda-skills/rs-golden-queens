name: 한국장 매매동향 테스트 푸시

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send Korea market flow to test chat
        env:
          TEST_GOLDENQUEENS_BOT_TOKEN: ${{ secrets.TEST_GOLDENQUEENS_BOT_TOKEN }}
          TEST_GOLDENQUEENS_CHAT_ID:   ${{ secrets.TEST_GOLDENQUEENS_CHAT_ID }}
          TEST_GOLENDENQUEENS_CHAT_ID: ${{ secrets.TEST_GOLENDENQUEENS_CHAT_ID }}
          MARKET_FLOW_RENDER: text
          TZ: Asia/Seoul
        run: python main.py daily-kr --test
