name: 주간 리포트 푸시

on:
  schedule:
    # 평일 KST 18:30 = UTC 09:30 (월~금)
    # 금요일이 휴장이면 직전 거래일(목/수/...)에 이월 발송하기 위해 평일 전체로 확장.
    # 스크립트 내부의 "그 주 마지막 거래일" 게이트가 발송 여부를 결정.
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send weekly report
        env:
          GOLDENQUEENS_BOT_TOKEN: ${{ secrets.GOLDENQUEENS_BOT_TOKEN }}
          GOLDENQUEENS_CHAT_ID:   ${{ secrets.GOLDENQUEENS_CHAT_ID }}
          MARKET_FLOW_RENDER: text
          TZ: Asia/Seoul
        run: python main.py weekly
