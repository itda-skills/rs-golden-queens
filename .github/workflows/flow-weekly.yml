name: 주간 리포트 푸시

on:
  schedule:
    # 금요일 KST 18:30 = UTC 금 09:30
    - cron: '30 9 * * 5'
  workflow_dispatch:

defaults:
  run:
    working-directory: market_flow

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: market_flow/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send weekly report
        env:
          GOLDENQUEENS_BOT_TOKEN: ${{ secrets.GOLDENQUEENS_BOT_TOKEN }}
          GOLDENQUEENS_CHAT_ID:   ${{ secrets.GOLDENQUEENS_CHAT_ID }}
          TZ: Asia/Seoul
        run: python weekly.py
