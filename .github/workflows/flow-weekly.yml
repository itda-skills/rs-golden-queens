name: 주간 리포트 푸시

on:
  # NAS 컨테이너 (allieus/rs-golden-queens) 의 APScheduler 로 정시 발화 이관.
  # 이 워크플로우는 비상용 수동 실행만 유지.
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send weekly report
        env:
          GOLDENQUEENS_BOT_TOKEN: ${{ secrets.GOLDENQUEENS_BOT_TOKEN }}
          GOLDENQUEENS_CHAT_ID:   ${{ secrets.GOLDENQUEENS_CHAT_ID }}
          MARKET_FLOW_RENDER: text
          TZ: Asia/Seoul
        run: python main.py weekly
