name: 주간 리포트 푸시

on:
  # NAS 작업 스케줄러가 GitHub API/CLI로 정시에 dispatch.
  # 필요하면 Actions 탭에서 수동 실행 가능.
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Setup data-repo deploy key
        if: ${{ secrets.DATA_REPO_DEPLOY_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}

      - name: Send weekly report
        env:
          GOLDENQUEENS_BOT_TOKEN: ${{ secrets.GOLDENQUEENS_BOT_TOKEN }}
          GOLDENQUEENS_CHAT_ID:   ${{ secrets.GOLDENQUEENS_CHAT_ID }}
          MARKET_FLOW_RENDER: text
          MARKET_FLOW_PUBLISH: ${{ secrets.DATA_REPO_DEPLOY_KEY != '' && '1' || '' }}
          TZ: Asia/Seoul
        run: python main.py weekly
