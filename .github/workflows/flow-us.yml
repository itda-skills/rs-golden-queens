name: 미국장 마감 푸시

on:
  schedule:
    # 한국 화~토 06:30 KST = UTC 월~금 21:30
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

defaults:
  run:
    working-directory: market_flow

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: market_flow/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send US market summary
        env:
          GOLDENQUEENS_BOT_TOKEN: ${{ secrets.GOLDENQUEENS_BOT_TOKEN }}
          GOLDENQUEENS_CHAT_ID:   ${{ secrets.GOLDENQUEENS_CHAT_ID }}
          TZ: Asia/Seoul
        run: python daily_us.py
