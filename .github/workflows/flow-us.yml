name: 미국장 마감 푸시

on:
  # Cloudflare cron-worker(cron-worker/)가 정시에 dispatch.
  # 필요하면 Actions 탭에서 수동 실행 가능.
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Setup data-repo deploy key
        if: ${{ env.DATA_REPO_DEPLOY_KEY != '' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}

      - name: Send US market summary
        env:
          GOLDENQUEENS_BOT_TOKEN: ${{ secrets.GOLDENQUEENS_BOT_TOKEN }}
          GOLDENQUEENS_CHAT_ID:   ${{ secrets.GOLDENQUEENS_CHAT_ID }}
          # 운영 발송 후 테스트 채널로도 동일 메시지 미러(확인용, best-effort)
          TEST_GOLDENQUEENS_BOT_TOKEN: ${{ secrets.TEST_GOLDENQUEENS_BOT_TOKEN }}
          TEST_GOLDENQUEENS_CHAT_ID:   ${{ secrets.TEST_GOLDENQUEENS_CHAT_ID }}
          MARKET_FLOW_MIRROR_TEST: '1'
          MARKET_FLOW_PUBLISH: ${{ env.DATA_REPO_DEPLOY_KEY != '' && '1' || '' }}
          MARKET_FLOW_REVALIDATE_URL: https://rs-golden-queens.vercel.app/api/revalidate
          MARKET_FLOW_REVALIDATE_SECRET: ${{ secrets.MARKET_FLOW_REVALIDATE_SECRET }}
          TZ: Asia/Seoul
        run: python main.py daily-us
